name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: triviafutbol
          POSTGRES_PASSWORD: triviafutbol
          POSTGRES_DB: triviafutbol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: ./backend

      - name: Lint
        run: npm run lint
        working-directory: ./backend

      - name: Auditoría de seguridad
        run: npm audit --audit-level=high
        working-directory: ./backend

      - name: Correr migraciones
        run: npm run migrate
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://triviafutbol:triviafutbol@localhost:5432/triviafutbol_test
          NODE_ENV: test

      - name: Tests
        run: npm run test:coverage
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://triviafutbol:triviafutbol@localhost:5432/triviafutbol_test
          NODE_ENV: test
          JWT_SECRET: test_secret_ci
          COOKIE_SECRET: test_cookie_ci

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/