name: Ejecutar Tests de Calidad

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
          POSTGRES_DB: trivia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Antes era v3 o v2
      
      - name: Configurar Node.js 24
        uses: actions/setup-node@v4 # Antes era v3
        with:
          node-version: 24 # ESTO MATA EL WARNING
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Correr Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test
          JWT_SECRET: test_secret_key_123
          NODE_ENV: test