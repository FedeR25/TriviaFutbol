name: Pipeline de Trivia Futbol (Test + Deploy)

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Ejecutar Tests de Calidad
    runs-on: ubuntu-latest
    
    # VOLVEMOS A LEVANTAR LA DB PARA EL TEST DE INTEGRACIÓN
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
          POSTGRES_DB: trivia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install
        working-directory: ./backend

      - name: Inicializar Tablas (EL PASO QUE FALTABA)
        run: |
          psql $DATABASE_URL -c "DROP TABLE IF EXISTS sessions, questions, users CASCADE;"
          psql $DATABASE_URL -c "CREATE TABLE users (id SERIAL PRIMARY KEY, username TEXT UNIQUE, password TEXT);"
          psql $DATABASE_URL -c "CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INTEGER, mode TEXT, score INTEGER DEFAULT 0, completed BOOLEAN DEFAULT FALSE);"
          psql $DATABASE_URL -c "CREATE TABLE questions (id SERIAL PRIMARY KEY, type TEXT, data JSONB);"
          psql $DATABASE_URL -c "INSERT INTO questions (type, data) VALUES ('teams', '{\"id\": \"team_A\", \"options\": [{\"id\": 1, \"text\": \"A\", \"correct\": true}, {\"id\": 2, \"text\": \"B\", \"correct\": false}]}'::jsonb);"
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test

      - name: Correr Tests con Cobertura
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test
          JWT_SECRET: test_secret_key_123
          COOKIE_SECRET: una_cookie_secreta_para_test_ci
          NODE_ENV: test
        run: npm run test:coverage
        working-directory: ./backend

      - name: Subir Reporte de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/coverage/

  deploy:
    name: Desplegar a Render
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Ejecutar Deploy en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}