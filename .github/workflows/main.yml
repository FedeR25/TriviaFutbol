name: Ejecutar Tests de Calidad

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Esto asegura que todos los comandos se ejecuten dentro de la carpeta donde está el package.json
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
          POSTGRES_DB: trivia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # No usamos cache aquí para evitar errores de package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Correr Tests con Cobertura
        run: npm test
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test
          JWT_SECRET: test_secret_key_123
          COOKIE_SECRET: una_cookie_secreta_para_test_ci
          NODE_ENV: test