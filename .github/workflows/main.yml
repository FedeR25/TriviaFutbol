name: Ejecutar Tests de Calidad

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_test
          POSTGRES_PASSWORD: password_test
          POSTGRES_DB: trivia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependencias
        run: npm install

      - name: Inicializar Base de Datos
        run: |
          psql $DATABASE_URL -c "DROP TABLE IF EXISTS sessions, questions, users CASCADE;"
          psql $DATABASE_URL -c "CREATE TABLE users (id SERIAL PRIMARY KEY, username TEXT UNIQUE, password TEXT);"
          psql $DATABASE_URL -c "CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INTEGER, mode TEXT, score INTEGER DEFAULT 0, completed BOOLEAN DEFAULT FALSE);"
          psql $DATABASE_URL -c "CREATE TABLE questions (id SERIAL PRIMARY KEY, type TEXT, data JSONB);"
          
          # INSERT USUARIO (Password: password123). Escapamos los $ para que bash no los rompa.
          psql $DATABASE_URL -c "INSERT INTO users (username, password) VALUES ('testadmin', '\$2b\$10\$Pa6vW9smO6Y5e.yYp6.f/.K.xM1PZ9x0D9M0u.0zY8Y8Y8Y8Y8Y8Y');"
          
          # INSERT PREGUNTA (Estructura exacta: team_A y opciones con ID)
          psql $DATABASE_URL -c "INSERT INTO questions (type, data) VALUES ('teams', '{\"id\": \"team_A\", \"options\": [{\"id\": 1, \"text\": \"Correcta\", \"correct\": true}, {\"id\": 2, \"text\": \"Incorrecta\", \"correct\": false}]}'::jsonb);"
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test

      - name: Correr Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://user_test:password_test@localhost:5432/trivia_test
          JWT_SECRET: secret_para_tests_ci_2026
          COOKIE_SECRET: una_cookie_secreta_para_test_ci
          NODE_ENV: test