name: Pipeline de Trivia Futbol (Test + Deploy)

on:
  push:
    branches:
      - main

jobs:
  # TRABAJO 1: Los Tests
  test:
    name: Ejecutar Tests de Calidad
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./backend/package.json

      - name: Instalar dependencias
        run: npm install
        working-directory: ./backend

      - name: Correr Tests con Cobertura
        run: npm run test:coverage
        working-directory: ./backend

      - name: Subir Reporte de Cobertura
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/coverage/

  # TRABAJO 2: El Deploy (SOLO si el trabajo 'test' sale bien)
  deploy:
    name: Desplegar a Render
    runs-on: ubuntu-latest
    needs: test  # <--- ESTA ES LA MAGIA: Si falla el test, este paso se salta.
    steps:
      - name: Ejecutar Deploy en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Notificar éxito
        run: echo "🚀 El código pasó los tests y ya está en producción."
