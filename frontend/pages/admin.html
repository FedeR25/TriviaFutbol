<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · TriviaFútbol</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radio-btn);
      padding: 12px 16px;
      margin-bottom: 10px;
    }
    .user-info { flex: 1; }
    .user-name { font-weight: 800; font-size: 16px; }
    .user-meta { color: var(--gris); font-size: 12px; margin-top: 2px; }
    .badge-reset {
      background: rgba(255,59,59,0.2);
      color: var(--rojo);
      border-radius: 50px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 800;
    }
    .btn-reset {
      background: rgba(229,124,0,0.2);
      border: 1px solid var(--naranja);
      color: var(--naranja);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-reset:hover { background: rgba(229,124,0,0.35); }
    .temp-pass {
      background: rgba(38,137,12,0.2);
      border: 1px solid var(--verde);
      border-radius: var(--radio-btn);
      padding: 14px 16px;
      margin-top: 16px;
      display: none;
    }
    .temp-pass.visible { display: block; }
    .temp-pass-value {
      font-family: 'Fredoka One', cursive;
      font-size: 24px;
      color: var(--verde);
      margin-top: 4px;
      letter-spacing: 2px;
    }
    .loading { text-align: center; color: var(--gris); padding: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>⚙️ Panel Admin</h2>

    <div id="usersList">
      <div class="loading">Cargando usuarios...</div>
    </div>

    <div class="temp-pass" id="tempPassBox">
      <div style="font-weight:800">Contraseña temporal para <span id="tempPassUser"></span>:</div>
      <div class="temp-pass-value" id="tempPassValue"></div>
      <div style="color:var(--gris); font-size:13px; margin-top:8px">Copiala y mandásela al usuario</div>
    </div>

    <br>
    <a class="btn btn-ghost" href="index.html">← Volver</a>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function init() {
      const user = await api.getMe();
      if (!user || !user.is_admin) {
        window.location.href = 'index.html';
        return;
      }
      loadUsers();
    }

    async function loadUsers() {
      const res = await api.getUsers();
      const list = document.getElementById('usersList');

      if (res.error) {
        list.innerHTML = `<div class="loading">Error al cargar usuarios</div>`;
        return;
      }

      list.innerHTML = res.users.map(u => `
        <div class="user-row">
          <div class="user-info">
            <div class="user-name">
              👤 ${u.username}
              ${u.is_admin ? '<span style="color:var(--amarillo);font-size:12px"> ★ ADMIN</span>' : ''}
              ${u.force_password_reset ? '<span class="badge-reset">RESET</span>' : ''}
            </div>
            <div class="user-meta">ID: ${u.id} · ${new Date(u.created_at).toLocaleDateString('es-AR')}</div>
          </div>
          ${!u.is_admin ? `<button class="btn-reset" onclick="resetPassword(${u.id}, '${u.username}')">🔑 Reset</button>` : ''}
        </div>
      `).join('');
    }

    async function resetPassword(userId, username) {
      if (!confirm(`¿Resetear la contraseña de ${username}?`)) return;

      const res = await api.resetPassword(userId);
      if (res.error) {
        alert('Error: ' + res.error);
        return;
      }

      document.getElementById('tempPassBox').classList.add('visible');
      document.getElementById('tempPassUser').textContent = username;
      document.getElementById('tempPassValue').textContent = res.tempPassword;
      loadUsers();
    }

    init();
  </script>
</body>
</html>
