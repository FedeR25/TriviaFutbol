<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TriviaFútbol ⚽</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .user-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 8px 16px;
      font-weight: 800;
      font-size: 14px;
    }
    .badge-admin {
      background: var(--amarillo);
      color: #000;
      border-radius: 50px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 900;
    }
    .divider {
      text-align: center;
      color: var(--gris);
      font-size: 13px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <div class="user-bar" id="userBar" style="display:none">
    <span id="usernameLabel">👤</span>
    <span class="badge-admin" id="adminBadge" style="display:none">ADMIN</span>
  </div>

  <div class="card">
    <div class="logo">Trivia<span>Fútbol</span> ⚽</div>
    <p class="subtitle">¿Cuánto sabés de fútbol?</p>

    <div class="btn-stack" id="mainButtons">
      <a class="btn btn-verde" href="select-mode.html">
        ⚽ ¡Jugar!
      </a>
      <a class="btn btn-azul" href="leaderboard.html">
        🏆 Tabla de posiciones
      </a>
      <div class="divider" id="dividerAuth">─────────────────</div>
      <a class="btn btn-ghost" href="login.html" id="btnLogin">
        Iniciar sesión
      </a>
      <a class="btn btn-ghost" id="btnAdmin" href="admin.html" style="display:none">
        ⚙️ Panel admin
      </a>
      <button class="btn btn-ghost" id="btnLogout" style="display:none" onclick="logout()">
        Cerrar sesión
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function init() {
      const user = await api.getMe();
      if (user) {
        document.getElementById('userBar').style.display = 'flex';
        document.getElementById('usernameLabel').textContent = '👤 ' + user.username;
        document.getElementById('btnLogin').style.display = 'none';
        document.getElementById('btnLogout').style.display = 'flex';
        if (user.is_admin) {
          document.getElementById('adminBadge').style.display = 'inline';
          document.getElementById('btnAdmin').style.display = 'flex';
        }
        if (user.force_password_reset) {
          window.location.href = 'login.html?reset=1';
        }
      }
    }

    async function logout() {
      await api.logout();
      window.location.reload();
    }

    init();
  </script>
</body>
</html>
