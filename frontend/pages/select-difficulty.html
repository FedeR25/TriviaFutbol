<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegí la dificultad · TriviaFútbol</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .diff-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: var(--radio);
      padding: 28px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .diff-card.easy:hover  { border-color: var(--verde);   background: rgba(38,137,12,0.1); transform: translateY(-3px); }
    .diff-card.hard:hover  { border-color: var(--rojo);    background: rgba(255,59,59,0.1); transform: translateY(-3px); }
    .diff-icon  { font-size: 52px; margin-bottom: 10px; }
    .diff-title { font-family: 'Fredoka One', cursive; font-size: 24px; margin-bottom: 8px; }
    .diff-desc  { color: var(--gris); font-size: 14px; line-height: 1.5; }
    .diff-grid  { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
    .mode-label {
      text-align: center;
      font-size: 13px;
      color: var(--gris);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mode-label span { color: var(--amarillo); font-weight: 900; }
  </style>
</head>
<body>

  <div class="card">
    <h2>¿Qué nivel?</h2>
    <div class="mode-label">Modo: <span id="modeLabel">...</span></div>

    <div class="diff-grid">
      <div class="diff-card easy" onclick="selectDifficulty('easy')">
        <div class="diff-icon">🟢</div>
        <div class="diff-title">Juveniles</div>
        <div class="diff-desc">Primera división · Jugadores famosos<br>Penalización: 5 segundos por error</div>
      </div>

      <div class="diff-card hard" onclick="selectDifficulty('hard')">
        <div class="diff-icon">🔴</div>
        <div class="diff-title">Primera División</div>
        <div class="diff-desc">Todas las divisiones · Todos los jugadores<br>Penalización: 10 segundos por error</div>
      </div>
    </div>

    <a class="btn btn-ghost" href="select-mode.html">← Volver</a>
  </div>

  <script>
    const MODE_LABELS = {
      teams: '🛡️ Equipos',
      players: '⭐ Jugadores',
      timed: '⏱️ Contra el Reloj'
    };

    const mode = sessionStorage.getItem('mode');
    if (!mode) window.location.href = 'select-mode.html';
    document.getElementById('modeLabel').textContent = MODE_LABELS[mode] || mode;

    function selectDifficulty(difficulty) {
      sessionStorage.setItem('difficulty', difficulty);
      window.location.href = 'game.html';
    }
  </script>
</body>
</html>
