<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elegí el modo · TriviaFútbol</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .mode-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: var(--radio);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mode-card:hover {
      border-color: var(--amarillo);
      transform: translateY(-3px);
      background: rgba(255,215,0,0.08);
    }
    .mode-icon { font-size: 48px; margin-bottom: 8px; }
    .mode-title {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .mode-desc { color: var(--gris); font-size: 14px; }
    .modes-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>¿Cómo querés jugar?</h2>

    <div class="modes-grid">
      <div class="mode-card" onclick="selectMode('teams')">
        <div class="mode-icon">🛡️</div>
        <div class="mode-title">Modo Equipos</div>
        <div class="mode-desc">Mirá el escudo y adiviná el equipo</div>
      </div>

      <div class="mode-card" onclick="selectMode('players')">
        <div class="mode-icon">⭐</div>
        <div class="mode-title">Modo Jugadores</div>
        <div class="mode-desc">¿En qué equipo juega este crack?</div>
      </div>

      <div class="mode-card" onclick="selectMode('timed')">
        <div class="mode-icon">⏱️</div>
        <div class="mode-title">Contra el Reloj</div>
        <div class="mode-desc">60 segundos, ¡respondé todo lo que puedas!</div>
      </div>
    </div>

    <a class="btn btn-ghost" href="index.html">← Volver</a>
  </div>
  <script src="js/api.js"></script>
  <script>
   async function selectMode(mode) {
  const user = await api.getMe();
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  sessionStorage.setItem('mode', mode);
  window.location.href = 'game.html';
}
  </script>
</body>
</html>
